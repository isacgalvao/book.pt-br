# Glossário de Termos Técnicos — Tradução Rust Book pt-BR
#
# Este glossário garante consistência entre todos os agentes de tradução.
# REGRA: ao encontrar um termo técnico no texto original, consulte este arquivo.
#
# Estrutura:
#   keep_english  → termos que permanecem em inglês no texto traduzido
#   translate     → termos com tradução definida (inglês: pt-BR)
#   contextual    → termos que variam conforme o contexto
#
# Ao adicionar novos termos, mantenha a ordem alfabética dentro de cada seção.

# ============================================================================
# Termos mantidos em inglês
# Estes termos são amplamente usados sem tradução na comunidade Rust/dev pt-BR.
# No texto, podem aparecer em itálico na primeira menção: *ownership*
# ============================================================================
